<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Lenses Notify</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #111820;
        --text: #f2f6fb;
        --muted: #9eb0c3;
        --accent: #fffc00;
        --card: #1b2430;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f7fa;
          --text: #1b2430;
          --muted: #5b6b7c;
          --card: #ffffff;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px;
        font: 600 14px/1.4 system-ui, -apple-system, Segoe UI, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .card {
        width: min(100%, 360px);
        background: var(--card);
        border-radius: 14px;
        padding: 16px 16px 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      img {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        background: #000;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 15px;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-weight: 500;
        white-space: pre-wrap;
        word-break: break-word;
      }
      button {
        margin-top: 14px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        background: var(--accent);
        color: #111;
        font: 700 13px/1 system-ui, sans-serif;
        cursor: pointer;
      }
      .hint {
        margin-top: 8px;
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row">
        <img id="icon" alt="" />
        <div>
          <h1 id="title">My Lenses Notify</h1>
          <p id="message">Status update</p>
        </div>
      </div>
      <button id="closeBtn" type="button">Got it</button>
      <div class="hint">This window closes in <span id="sec">12</span>s</div>
    </div>
    <script src="alert.js"></script>
  </body>
</html>
